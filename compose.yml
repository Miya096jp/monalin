services:
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: monalin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monalin"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      dockerfile: Dockerfile.dev
    tty: true
    command: >
      bash -c "rm -f tmp/pids/server.pid && bin/dev"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://monalin:password@db:5432/monalin_development
      
volumes:
  postgres_data:
  bundle_cache:
